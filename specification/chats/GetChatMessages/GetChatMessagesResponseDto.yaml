required:
  - messages
  - participants
  - count
  - success
  - nodeTimestamp
properties:
  messages:
    type: array
    items:
      oneOf:
        - $ref: '../../common/transactions/TokenTransferTransaction.yaml'
        - $ref: '../../common/transactions/ChatMessageTransaction.yaml'
  participants:
    type: array
    items:
      $ref: '../ChatParticipant.yaml'
  count:
    type: integer
    description: Total number of messages in the chatroom (independent of `limit`/`offset`).
  success:
    type: boolean
  nodeTimestamp:
    type: number
