required:
  - success
  - nodeTimestamp
  - loader
  - network
  - version
  - wsClient
properties:
  success:
    type: boolean
    example: true
  nodeTimestamp:
    type: number
    example: 58052984
  loader:
    required:
      - loaded
      - now
      - syncing
      - consensus
      - blocks
      - blocksCount
    properties:
      loaded:
        type: boolean
      now:
        type: number
      syncing:
        type: boolean
      consensus:
        type: number
      blocks:
        type: number
      blocksCount:
        type: number
    example:
      loaded: true
      now: 4819
      syncing: true
      consensus: 0
      blocks: 15145334
      blocksCount: 0
  network:
    $ref: "../NetworkStatus.yaml"
  version:
    $ref: "../NodeVersion.yaml"
  wsClient:
    $ref: "../WsClient.yaml"
